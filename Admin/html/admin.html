<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin  - Website Bán Xe</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    display: flex;
}

.sidebar {
    width: 250px;
    background-color: #2c3e50;
    color: white;
    padding: 20px;
    height: 100vh;
}

.logo-container {
    text-align: center;
    margin-bottom: 30px;
    width:150px ;
    height: 220px;
    margin-right: auto;
}

.logo {
    width: 150px;
    height:auto;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 35px;
}

.sidebar ul {
    list-style: none;
}

.sidebar ul li {
    margin: 20px 0;
}

.sidebar ul li a {
    color: white;
    text-decoration: none;
    font-size: 18px;
    display: block;
    padding: 10px;
}

.sidebar ul li a:hover {
    background-color: #34495e;
}

.main-content {
    flex-grow: 1;
    padding: 20px;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 0;
    border-bottom: 2px solid #ccc;
}

header h1 {
    font-size: 24px;
}

.table-section {
    margin-top: 20px;
}

.add-btn {
    background-color: #3498db;
    color: white;
    border: none;
    padding: 10px 15px;
    cursor: pointer;
    margin-bottom: 20px;
}

.add-btn:hover {
    background-color: #2980b9;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

table, th, td {
    border: 1px solid #ddd;
}

th, td {
    padding: 10px;
    text-align: center;
}

th {
    background-color: #f4f4f4;
}

form input, form button {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
}

form button {
    background-color: #2ecc71;
}

form button[type="button"] {
    background-color: #e74c3c;
}

.form-popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    align-items: center;
    justify-content: center;
}

.popup-form {
    background-color: white;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
}

.popup-form h2 {
    text-align: center;
    margin-bottom: 20px;
}

</style>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo-container">
            <img src="https://images.unsplash.com/photo-1617109887854-f661d37fca2d?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTl8fG1vdG9yJTIwYmlrZXxlbnwwfHwwfHx8MA%3D%3D" alt="Logo" class="logo">
        </div>
        <h2>Admin</h2>
        <ul>
            <li><a href="#">Trang Chủ</a></li>
            <li><a href="#">Danh Sách Xe</a></li>
            <li><a href="#">Thêm Xe Mới</a></li>
            <li><a href="#">Quản Lý Đơn Hàng</a></li>
            <li><a href="#">Quản Lý Khách Hàng</a></li>
            <li><a href="#">Đăng Xuất</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <header>
            <div class="header-logo">
                <img src="https://images.unsplash.com/photo-1617109887854-f661d37fca2d?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTl8fG1vdG9yJTIwYmlrZXxlbnwwfHwwfHx8MA%3D%3D" alt="Logo" class="logo">
            </div>
            <h1>Quản Lý Xe</h1>
        </header>

        <!-- Bảng danh sách xe -->
        <section class="table-section">
            <h2>Danh Sách Xe</h2>
            <button class="add-btn" onclick="showAddForm()">Thêm Xe Mới</button>

            <table>
                <thead>
                    <tr>
                        <th>Hình Ảnh</th>
                        <th>Tên Xe</th>
                        <th>Loại Xe</th>
                        <th>Giá</th>
                        <th>Thao Tác</th>
                    </tr>
                </thead>
                <tbody id="car-list">
                    <!-- Danh sách xe sẽ hiển thị ở đây -->
                </tbody>
            </table>
        </section>

        <!-- Form thêm xe mới -->
        <div class="form-popup" id="add-form">
            <form id="add-car-form" class="popup-form">
                <h2>Thêm Xe Mới</h2>
                <label for="car-name">Tên Xe:</label>
                <input type="text" id="car-name" required>

                <label for="car-type">Loại Xe:</label>
                <input type="text" id="car-type" required>

                <label for="car-price">Giá Xe:</label>
                <input type="number" id="car-price" required>

                <label for="car-image">Ảnh Xe:</label>
                <input type="file" id="car-image">

                <button type="submit">Thêm Xe</button>
                <button type="button" onclick="closeAddForm()">Hủy</button>
            </form>
        </div>

    </div>

</body> 
    <script>
    const carList = document.getElementById('car-list');
const addForm = document.getElementById('add-form');
const addCarForm = document.getElementById('add-car-form');

let cars = [];

function renderCarList() {
    carList.innerHTML = '';
    cars.forEach((car, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><img src="${car.image}" alt="${car.name}" style="width: 50px; height: 50px;"></td>
            <td>${car.name}</td>
            <td>${car.type}</td>
            <td>${car.price.toLocaleString()} VND</td>
            <td>
                <button onclick="deleteCar(${index})">Xóa</button>
                <button onclick="editCar(${index})">Sửa</button>
            </td>
        `;
        carList.appendChild(tr);
    });
}

function showAddForm() {
    addForm.style.display = 'flex';
}

function closeAddForm() {
    addForm.style.display = 'none';
}

function addCar(event) {
    event.preventDefault();
    const name = document.getElementById('car-name').value;
    const type = document.getElementById('car-type').value;
    const price = parseFloat(document.getElementById('car-price').value);
    const image = URL.createObjectURL(document.getElementById('car-image').files[0]);

    const newCar = {
        name,
        type,
        price,
        image
    };

    cars.push(newCar);
    renderCarList();
    closeAddForm();
}

function deleteCar(index) {
    cars.splice(index, 1);
    renderCarList();
}

function editCar(index) {
    alert('Chức năng sửa chưa được thực hiện!');
}

addCarForm.addEventListener('submit', addCar);
renderCarList();

</script>
</html>
