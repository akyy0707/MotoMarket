<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Website Bán Xe</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo-container">
            <img src="logo.png" alt="Logo" class="logo">
        </div>
        <div class="menu">
            <h2>Admin</h2>
            <ul>
                <li><a href="#">Quản Lý Xe</a></li>
                <li><a href="#">Quản Lý Đơn Hàng</a></li>
                <li><a href="#">Quản Lý Khách Hàng</a></li>
                <li><a href="#">Thoát</a></li>
            </ul>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="main-header">
            <h1>Quản Lý Xe</h1>
        </div>

        <!-- Bảng danh sách xe -->
        <section class="table-section">
            <button class="add-btn" onclick="showAddForm()">Thêm Xe Mới</button>
            <h2>Danh Sách Xe</h2>

            <table>
                <thead>
                    <tr>
                        <th>Hình Ảnh</th>
                        <th>Tên Xe</th>
                        <th>Loại Xe</th>
                        <th>Giá</th>
                        <th>Thao Tác</th>
                    </tr>
                </thead>
                <tbody id="car-list">
                    <!-- Danh sách xe sẽ hiển thị ở đây -->
                </tbody>
            </table>
        </section>

        <!-- Form thêm xe mới -->
        <div class="form-popup" id="add-form">
            <form id="add-car-form" class="popup-form">
                <h2>Thêm Xe Mới</h2>
                <label for="car-name">Tên Xe:</label>
                <input type="text" id="car-name" required>

                <label for="car-type">Loại Xe:</label>
                <input type="text" id="car-type" required>

                <label for="car-price">Giá Xe:</label>
                <input type="number" id="car-price" required>

                <label class="file-label" for="car-image">Ảnh Xe:</label>
                <input type="file" id="car-image">
                <span class="file-name" id="fileName">No file chosen</span>

                <button id="add-car-btn" type="submit">Thêm Xe</button>
                <button id="close-add-form" type="button" onclick="closeAddForm()">Hủy</button>
            </form>
        </div>

    </div>
    <script>
        const carList = document.getElementById('car-list');
        const addForm = document.getElementById('add-form');
        const addCarForm = document.getElementById('add-car-form');

        let cars = [];

        function renderCarList() {
            carList.innerHTML = '';
            cars.forEach((car, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                <td><img src="${car.image}" alt="${car.name}" style="width: 50px; height: 50px;"></td>
                <td>${car.name}</td>
                <td>${car.type}</td>
                <td>${car.price.toLocaleString()} VND</td>
                <td>
                    <button id="delete-btn" onclick="deleteCar(${index})">Xóa</button>
                    <button id="edit-btn" onclick="editCar(${index})">Sửa</button>
                </td>
            `;
                carList.appendChild(tr);
            });
        }

        function showAddForm() {
            addForm.style.display = 'flex';
        }

        function closeAddForm() {
            addForm.style.display = 'none';
        }
        const fileInput = document.getElementById("car-image");
        const fileName = document.getElementById("fileName")
        fileInput.addEventListener("change", function () {
            if (fileInput.files.length > 0) {
                fileName.textContent = fileInput.files[0].name;
            } else {
                fileName.textContent = "No file chosen";
            }
        });
        function addCar(event) {
            event.preventDefault();
            const name = document.getElementById('car-name').value;
            const type = document.getElementById('car-type').value;
            const price = parseFloat(document.getElementById('car-price').value);
            const image = URL.createObjectURL(document.getElementById('car-image').files[0]);


            const newCar = {
                name,
                type,
                price,
                image
            };

            cars.push(newCar);
            renderCarList();
            closeAddForm();
        }

        function deleteCar(index) {
            cars.splice(index, 1);
            renderCarList();
        }

        function editCar(index) {
            alert('Chức năng sửa chưa được thực hiện!');
        }

        addCarForm.addEventListener('submit', addCar);
        renderCarList();

    </script>
</body>

</html>
